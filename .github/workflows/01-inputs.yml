name: 01-inputs

on:
  workflow_dispatch:
    inputs:
      dry-build:
        description: 'Perform a dry run of the build process'
        type: boolean
        default: false
      target:
        description: 'Deployment target'
        type: choice
        default: v3
        options:
          - v1
          - v2
          - v3
      choice:
        description: 'Choose an option'
        type: choice
        options:
          - v1
          - v2
          - v3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Print input value
      run: echo "Dry build input value is ${{ github.event.inputs.dry-build }}"
      
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

    - name: Deploy if dry build is false
      if: ${{ github.event.inputs.dry-build == 'false' }}
      run: echo "Deploying the application..."